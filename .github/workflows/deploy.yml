name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Deploy via SSH
        run: |
          tailscale ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /home/nyne87/myapps/chrispalkaportfolioV3 && git pull origin main && npm install && npm run build"
